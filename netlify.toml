[build]
publish = "."

# Long-term cache for images (WebP + JPG) – versioned via file content
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-term cache for versioned CSS/JS assets
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages: always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# PHP scripts
[[headers]]
  for = "/*.php"
  [headers.values]
    Cache-Control = "no-store"
